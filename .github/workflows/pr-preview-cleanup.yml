name: Destroy PR Preview
on:
  pull_request:
    types: [closed]
permissions: { contents: read, id-token: write }
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_PREVIEW_ROLE_ARN }}
      - name: Destroy AWS resources in CodeBuild
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          show_build_failure() {
            build="$(aws codebuild batch-get-builds --ids "$id" --output json)"
            printf '%s\n' "$build" | jq '{builds:[.builds[] | {id,buildNumber,buildStatus,currentPhase,phases,logs:{groupName:.logs.groupName,streamName:.logs.streamName,deepLink:.logs.deepLink}}],buildsNotFound}'
            log_group="$(printf '%s' "$build" | jq -r '.builds[0].logs.groupName')"
            log_stream="$(printf '%s' "$build" | jq -r '.builds[0].logs.streamName')"
            aws logs get-log-events --log-group-name "$log_group" --log-stream-name "$log_stream" --start-from-head --query 'events[].message' --output text || true
          }
          id="$(aws codebuild start-build --project-name profile-preview-deploy --source-version "$GIT_SHA" --buildspec-override buildspec.preview-cleanup.yml --environment-variables-override "name=PR_NUMBER,value=$PR_NUMBER,type=PLAINTEXT" "name=GIT_SHA,value=$GIT_SHA,type=PLAINTEXT" --query 'build.id' --output text)"
          while :; do status="$(aws codebuild batch-get-builds --ids "$id" --query 'builds[0].buildStatus' --output text)"; case "$status" in SUCCEEDED) break;; FAILED|FAULT|STOPPED|TIMED_OUT) show_build_failure; exit 1;; *) sleep 10;; esac; done
      - name: Remove exact preview DNS records
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          status=0
          RECORD_NAME="pr-$PR_NUMBER.preview.seebyte.xyz" sh scripts/preview/cloudflare-delete-dns.sh || status=1
          PAGES_DOMAIN="pr-$PR_NUMBER.preview.seebyte.xyz" PAGES_DOMAIN_ACTION=delete sh scripts/preview/cloudflare-pages-domain.sh || status=1
          RECORD_NAME="api-pr-$PR_NUMBER.preview.seebyte.xyz" sh scripts/preview/cloudflare-delete-dns.sh || status=1
          exit "$status"
