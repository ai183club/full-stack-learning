name: Deploy PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths: ["apps/api/**", "apps/lambda/**", "apps/web/**", "apps/db-bootstrap/**", "scripts/preview/**", "buildspec.preview*.yml", ".github/workflows/pr-preview-validate.yml", "package.json", "pnpm-lock.yaml"]
  workflow_dispatch:
    inputs:
      pr_number: { required: true, type: string }
      git_sha: { required: true, type: string }

permissions: { contents: read, id-token: write, pull-requests: read }

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || inputs.git_sha }}
        run: sh scripts/preview/pr-context.sh
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_PREVIEW_ROLE_ARN }}
      - id: image
        env:
          PR_NUMBER: ${{ steps.preview.outputs.pr_number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || inputs.git_sha }}
        run: |
          set -euo pipefail
          show_build_failure() {
            build="$(aws codebuild batch-get-builds --ids "$id" --output json)"
            printf '%s\n' "$build"
            log_group="$(printf '%s' "$build" | jq -r '.builds[0].logs.groupName')"
            log_stream="$(printf '%s' "$build" | jq -r '.builds[0].logs.streamName')"
            aws logs get-log-events --log-group-name "$log_group" --log-stream-name "$log_stream" --start-from-head --query 'events[].message' --output text || true
          }
          id="$(aws codebuild start-build --project-name profile-preview-deploy --source-version "$SOURCE_SHA" --environment-variables-override "name=PR_NUMBER,value=$PR_NUMBER,type=PLAINTEXT" --query 'build.id' --output text)"
          while :; do status="$(aws codebuild batch-get-builds --ids "$id" --query 'builds[0].buildStatus' --output text)"; case "$status" in SUCCEEDED) break;; FAILED|FAULT|STOPPED|TIMED_OUT) show_build_failure; exit 1;; *) sleep 10;; esac; done
          digest="$(aws ecr describe-images --repository-name profile-api --image-ids imageTag=${{ steps.preview.outputs.image_tag }} --query 'imageDetails[0].imageDigest' --output text)"
          echo "image_uri=017719539487.dkr.ecr.ap-northeast-1.amazonaws.com/profile-api@$digest" >> "$GITHUB_OUTPUT"
      - name: Create or update AWS preview resources in CodeBuild
        env:
          PR_NUMBER: ${{ steps.preview.outputs.pr_number }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || inputs.git_sha }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          show_build_failure() {
            build="$(aws codebuild batch-get-builds --ids "$id" --output json)"
            printf '%s\n' "$build"
            log_group="$(printf '%s' "$build" | jq -r '.builds[0].logs.groupName')"
            log_stream="$(printf '%s' "$build" | jq -r '.builds[0].logs.streamName')"
            aws logs get-log-events --log-group-name "$log_group" --log-stream-name "$log_stream" --start-from-head --query 'events[].message' --output text || true
          }
          id="$(aws codebuild start-build --project-name profile-preview-deploy --source-version "$GIT_SHA" --buildspec-override buildspec.preview-deploy.yml --environment-variables-override "name=PR_NUMBER,value=$PR_NUMBER,type=PLAINTEXT" "name=GIT_SHA,value=$GIT_SHA,type=PLAINTEXT" "name=IMAGE_URI,value=$IMAGE_URI,type=PLAINTEXT" --query 'build.id' --output text)"
          while :; do status="$(aws codebuild batch-get-builds --ids "$id" --query 'builds[0].buildStatus' --output text)"; case "$status" in SUCCEEDED) break;; FAILED|FAULT|STOPPED|TIMED_OUT) show_build_failure; exit 1;; *) sleep 10;; esac; done
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build, deploy, and map preview web
        env:
          NEXT_PUBLIC_PROFILE_API_URL: https://${{ steps.preview.outputs.api_host }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          RECORD_NAME: ${{ steps.preview.outputs.web_host }}
          RECORD_TARGET: ${{ steps.preview.outputs.preview_branch }}.${{ secrets.CLOUDFLARE_PAGES_PROJECT }}.pages.dev
        run: |
          pnpm --filter web build
          npx --yes wrangler@4 pages deploy apps/web/out --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch="${{ steps.preview.outputs.preview_branch }}"
          sh scripts/preview/cloudflare-dns.sh
          RECORD_NAME="${{ steps.preview.outputs.api_host }}" RECORD_TARGET="$(aws apigatewayv2 get-domain-name --domain-name '${{ steps.preview.outputs.api_host }}' --query 'DomainNameConfigurations[0].ApiGatewayDomainName' --output text)" sh scripts/preview/cloudflare-dns.sh
