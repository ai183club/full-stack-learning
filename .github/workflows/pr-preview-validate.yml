name: Validate PR Preview Contract

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "apps/api/**"
      - "apps/lambda/**"
      - "apps/web/**"
      - "apps/db-bootstrap/**"
      - "buildspec.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - "scripts/preview/**"
      - ".github/workflows/pr-preview-validate.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Existing GitHub PR number"
        required: true
        type: string
      git_sha:
        description: "Commit SHA to validate"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      api_or_web_changed: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.changes.outputs.api_or_web }}
      lambda_changed: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.changes.outputs.lambda }}
    steps:
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            api_or_web:
              - 'apps/api/**'
              - 'apps/web/**'
              - 'apps/db-bootstrap/**'
              - 'buildspec.yml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
            lambda:
              - 'apps/lambda/**'
              - 'pnpm-lock.yaml'
              - 'package.json'

  validate:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive safe preview resource names
        id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || inputs.git_sha }}
        run: sh scripts/preview/pr-context.sh

      - name: Report preview contract
        env:
          API_OR_WEB_CHANGED: ${{ needs.classify.outputs.api_or_web_changed }}
          LAMBDA_CHANGED: ${{ needs.classify.outputs.lambda_changed }}
          DATABASE_SCHEMA: ${{ steps.preview.outputs.schema }}
          ECS_SERVICE: ${{ steps.preview.outputs.ecs_service }}
          TARGET_GROUP: ${{ steps.preview.outputs.target_group }}
          WEB_HOST: ${{ steps.preview.outputs.web_host }}
          API_HOST: ${{ steps.preview.outputs.api_host }}
        run: |
          {
            echo "## PR Preview contract"
            echo
            echo "- API/Web preview required: \`${API_OR_WEB_CHANGED}\`"
            echo "- Lambda-only validation required: \`${LAMBDA_CHANGED}\`"
            echo "- Schema: \`${DATABASE_SCHEMA}\`"
            echo "- ECS service: \`${ECS_SERVICE}\`"
            echo "- Target group: \`${TARGET_GROUP}\`"
            echo "- Web: \`https://${WEB_HOST}\`"
            echo "- API: \`https://${API_HOST}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build_preview_image:
    needs: [classify, validate]
    if: >-
      needs.classify.outputs.api_or_web_changed == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Configure preview AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_PREVIEW_ROLE_ARN }}

      - name: Start preview image build
        id: build
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || inputs.git_sha }}
        run: |
          set -euo pipefail
          build_id="$(aws codebuild start-build \
            --project-name profile-preview-deploy \
            --source-version "$SOURCE_SHA" \
            --environment-variables-override "name=PR_NUMBER,value=$PR_NUMBER,type=PLAINTEXT" \
            --query 'build.id' \
            --output text)"
          echo "id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Wait for preview image build
        shell: bash
        run: |
          set -euo pipefail
          while true; do
            status="$(aws codebuild batch-get-builds \
              --ids "${{ steps.build.outputs.id }}" \
              --query 'builds[0].buildStatus' \
              --output text)"
            case "$status" in
              SUCCEEDED) exit 0 ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) echo "CodeBuild finished with $status" >&2; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
