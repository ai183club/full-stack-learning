name: Deploy Bio Worker Lambda

on:
  push:
    branches: [main]
    paths:
      - "apps/bio-worker/**"
      - "packages/config/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/bio-worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test and package worker
        run: |
          pnpm --filter bio-worker test
          pnpm --filter bio-worker build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: arn:aws:iam::017719539487:role/profile-github-actions-role

      - name: Update worker code
        run: |
          aws lambda update-function-code \
            --function-name profile-bio-worker \
            --zip-file fileb://apps/bio-worker/dist/profile-bio-worker.zip
          aws lambda wait function-updated --function-name profile-bio-worker
