name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/web-cloudflare-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web site
        env:
          NEXT_PUBLIC_PROFILE_API_URL: https://f7a52mymmg.execute-api.ap-northeast-1.amazonaws.com
        run: pnpm --filter web build

      - name: Ensure and deploy Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          projects="$(npx --yes wrangler@4 pages project list --json)"
          if printf '%s' "$projects" | jq -e --arg name "$CLOUDFLARE_PAGES_PROJECT" 'if type == "array" then any(.[]; (.name // .["Project Name"]) == $name) else any(.projects[]?; (.name // .["Project Name"]) == $name) end' > /dev/null; then
            echo "Cloudflare Pages project already exists."
          else
            npx --yes wrangler@4 pages project create "$CLOUDFLARE_PAGES_PROJECT" --production-branch=main
          fi
          npx --yes wrangler@4 pages deploy apps/web/out --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main
